name: chatgpt
url: https://chatgpt.com
skip_new_chat: true  # headless navigation triggers Cloudflare bot detection

placeholders:
  - "ChatGPT is thinking…"
  - "Searching…"

selectors:
  chat_input: '[role="textbox"]'
  submit_button: 'button[data-testid="send-button"]'
  last_ai_msg: '[data-message-author-role="assistant"]'
