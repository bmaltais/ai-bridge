# OpenRouter — API-based provider (no browser, no cookies)
# Docs: https://openrouter.ai/docs
# Get an API key: https://openrouter.ai/keys
# Free models: https://openrouter.ai/models?q=:free
#
# Usage:
#   POST /v1/proxy  {"site": "openrouter", "prompt": "...", "model": "llama-70b"}
#
# Model key can be any key below, or pass a raw OpenRouter model ID directly
# (e.g. "meta-llama/llama-3.3-70b-instruct") — unmapped values are passed through as-is.

name: openrouter
provider_type: api

models:
  # Default: free tier (no credits required)
  free: "openrouter/free"

  # Paid: let OpenRouter pick the best available model
  auto: "openrouter/auto"

  # --- Free models (no cost, :free suffix required) ---
  llama-70b: "meta-llama/llama-3.3-70b-instruct:free"
  llama-8b: "meta-llama/llama-3.1-8b-instruct:free"
  gemma-27b: "google/gemma-3-27b-it:free"
  gemma-12b: "google/gemma-3-12b-it:free"
  qwen-72b: "qwen/qwen-2.5-72b-instruct:free"
  qwen-14b: "qwen/qwen2.5-14b-instruct:free"
  mistral: "mistralai/mistral-small-3.1-24b-instruct:free"
  deepseek-r1: "deepseek/deepseek-r1:free"
  deepseek-v3: "deepseek/deepseek-chat-v3-0324:free"
  phi-4: "microsoft/phi-4:free"
