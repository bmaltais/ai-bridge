name: x-grok
url: https://x.com/i/grok
aliases:
  - x-grok
  - grok-x

# Skip start_new_chat: x.com/i/grok redirects to ?conversation=<id> after first send.
# Navigating to origin (https://x.com) loses the Grok interface. Stay on current page.
skip_new_chat: true

# Enable DOM-scan fallback: x.com uses hashed atomic CSS classes that may change between
# deploys. If the primary last_ai_msg selector (.r-1wbh5a2.r-11niif6) stops matching,
# streaming.py falls back to finding leaf elements with >100 chars inside <main>.
fallback_detection: true

# Use submit-button state as the primary completion gate instead of text-stability timing.
# Grok disables (or replaces with a stop button) 'button[aria-label="Grok something"]'
# while generating and re-enables it when done.  This is a binary DOM signal, so
# mid-response pauses (Grok "thinking" phases between paragraphs, Expert mode reasoning
# steps) no longer trigger false completion — unlike the 1500ms stability heuristic which
# fires whenever text is unchanged for 1.5s regardless of whether Grok is still working.
completion_signal: submit_button_enabled

placeholders:
  - "Thinking..."
  - "Generating..."
  - "Loading..."
  # Grok shows "Thinking about <topic>\n<one-line summary>" in the last_ai_msg element
  # before the real response streams. Caught by streaming.py _is_complete() startswith
  # guard — listed here for documentation only (exact-match placeholders won't fire).
  - "Thinking about"

selectors:
  chat_input: 'textarea[placeholder*="Ask anything" i]'
  submit_button: 'button[aria-label="Grok something"]'
  # AI message container: r-1wbh5a2+r-11niif6 distinguish AI turns from user turns.
  # User turns have r-3pj75a instead of r-1wbh5a2. Discovered 2026-03-16 via DOM inspection.
  last_ai_msg: '.r-1wbh5a2.r-11niif6'
  # Appears ONLY after Grok finishes generating — confirmed 2026-03-17 via live DOM inspection.
  # The send button (button[aria-label="Grok something"]) is absent from the DOM when idle
  # (only appears while typing), so submit_button_enabled is useless as a done signal here.
  # Regenerate is the reliable post-completion indicator.
  done_indicator: 'button[aria-label="Regenerate"]'

capabilities:
  new_chat:
    type: button
    # x.com/i/grok has no reliable "New Chat" button accessible without side-effects.
    # invoke_capability routes new_chat via site_config.url navigation instead.
    # Selector is unused but required by schema — set to chat_input as a safe fallback.
    selector: 'textarea[placeholder*="Ask anything" i]'
    action: click
    description: "Start a fresh conversation by navigating to x.com/i/grok"
    requires_confirmation: false
  model_selector:
    type: button
    # Confirmed via DOM inspection 2026-03-16: button[aria-label="Auto"] opens a
    # [role="menuitem"] dropdown — NOT [role="option"]. scraper.select_model() now
    # handles both. Available options confirmed: Auto, Fast, Expert.
    selector: 'button[aria-label="Auto"]'
    action: click
    description: "Switch Grok response mode (Auto / Fast / Expert)"
    options:
      - value: "Auto"
        label: "Auto"
      - value: "Fast"
        label: "Fast"
      - value: "Expert"
        label: "Expert"
  grok_420_beta:
    type: toggle
    # Confirmed via DOM inspection 2026-03-16 (user demonstrated in bridge browser).
    # The toggle is input[role="switch"] inside the Auto dropdown — only visible when
    # the dropdown is open. Selector is stable (role attribute, not hashed class).
    # Current state read via: document.querySelector('input[role="switch"]').checked
    # To toggle: open dropdown (button[aria-label="Auto"]) then click the switch.
    selector: 'input[role="switch"]'
    action: toggle
    description: "Enable/disable Grok 4.20 Beta (Early Access) — requires dropdown open first"
